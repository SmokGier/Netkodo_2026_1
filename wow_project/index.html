<!DOCTYPE html>
<html>
<head>
    <title>🎮 ULTIMATE BLOCK JUMPER</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { display:flex; justify-content:center; align-items:center; min-height:100vh; background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%); font-family:'Segoe UI',sans-serif; overflow:hidden; }
        .game-container { position:relative; width:850px; height:600px; border:6px solid #4a4a4a; border-radius:20px; box-shadow:0 0 40px rgba(0,0,0,0.9),0 0 60px rgba(100,100,255,0.5); overflow:hidden; background:#0a0a1a; margin:20px; }
        canvas { display:block; background:linear-gradient(to bottom,#1e3c72 0%,#2a5298 40%,#87CEEB 100%); }
        .hud { position:absolute; top:15px; left:0; right:0; padding:12px 25px; background:rgba(10,10,30,0.92); color:white; font-size:26px; font-weight:bold; display:flex; justify-content:space-between; z-index:200; border-bottom:3px solid #4cc9f0; box-shadow:0 5px 15px rgba(0,0,0,0.5); }
        .start-screen, .game-over { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(5,5,15,0.95); display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:300; color:white; text-align:center; backdrop-filter:blur(5px); }
        .start-screen h1 { font-size:80px; background:linear-gradient(45deg,#4cc9f0,#7209b7,#f72585); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:20px; text-shadow:0 0 30px rgba(76,201,240,0.7); letter-spacing:3px; }
        button { background:linear-gradient(135deg,#4cc9f0 0%,#4361ee 50%,#3a0ca3 100%); color:white; border:none; padding:20px 50px; font-size:28px; font-weight:bold; border-radius:40px; cursor:pointer; margin:15px; transition:all 0.3s; box-shadow:0 5px 20px rgba(0,0,0,0.4); }
        button:hover { transform:scale(1.08); box-shadow:0 8px 25px rgba(76,201,240,0.6); }
        .controls { background:rgba(30,30,60,0.85); padding:15px; border-radius:15px; margin-top:20px; font-size:18px; max-width:600px; line-height:1.5; color:#a0a0c0; }
        #message { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(56,189,248,0.9); color:white; padding:20px 40px; border-radius:25px; font-size:32px; font-weight:bold; z-index:250; display:none; }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="850" height="600"></canvas>
        
        <div class="hud">
            <div>💰 <span id="score">0</span></div>
            <div>❤️ <span id="lives">3</span></div>
            <div>LEVEL: <span id="level">1</span></div>
        </div>
        
        <div id="message"></div>
        
        <div class="start-screen" id="startScreen">
            <h1>ULTIMATE BLOCK JUMPER</h1>
            <div style="font-size:28px;margin:25px 0;color:#a0a0c0;text-shadow:0 2px 10px rgba(0,0,0,0.5);">Jump • Collect • Survive</div>
            <button onclick="startGame()">🚀 START GAME</button>
            <div class="controls">
                🎮 CONTROLS:<br>
                A/D or ←/→ = Move | W or ↑ = Jump | SPACE = Pause<br>
                Collect 🪙 coins | Avoid 👾 enemies | Grab 🦘 for double jump
            </div>
        </div>
        
        <div class="game-over" id="gameOver" style="display:none;">
            <h2 style="font-size:70px;margin-bottom:30px;">🏆 MISSION COMPLETE!</h2>
            <div style="font-size:42px;margin:25px 0;color:#ffd700;text-shadow:0 0 15px rgba(255,215,0,0.7);">FINAL SCORE: <span id="finalScore">0</span></div>
            <button onclick="restartGame()">✨ PLAY AGAIN</button>
        </div>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const messageEl = document.getElementById('message');
        
        // Game state
        let gameRunning = false;
        let gamePaused = false;
        let player = { x: 100, y: 450, width: 45, height: 55, velX: 0, velY: 0, speed: 9, jumpPower: 16, gravity: 0.85, jumping: false, direction: 1, doubleJump: false, doubleJumpUsed: false };
        let platforms = [];
        let coins = [];
        let enemies = [];
        let powerups = [];
        let particles = [];
        let score = 0;
        let lives = 3;
        let level = 1;
        let keys = { left: false, right: false, up: false };
        let lastTimestamp = 0;
        let animationFrameId = null;
        
        // Level designs
        const levels = [
            // Level 1
            {
                platforms: [
                    { x: 0, y: 550, width: 850, height: 50, color: '#2ecc71' },
                    { x: 150, y: 450, width: 100, height: 25, color: '#27ae60' },
                    { x: 320, y: 400, width: 100, height: 25, color: '#27ae60' },
                    { x: 500, y: 350, width: 100, height: 25, color: '#27ae60' },
                    { x: 250, y: 300, width: 100, height: 25, color: '#27ae60' },
                    { x: 450, y: 250, width: 100, height: 25, color: '#27ae60' },
                    { x: 180, y: 200, width: 100, height: 25, color: '#27ae60' },
                    { x: 650, y: 450, width: 100, height: 25, color: '#27ae60' },
                    { x: 80, y: 150, width: 100, height: 25, color: '#27ae60' },
                    { x: 380, y: 120, width: 100, height: 25, color: '#27ae60' }
                ],
                coins: [
                    { x: 200, y: 420, collected: false },
                    { x: 370, y: 370, collected: false },
                    { x: 550, y: 320, collected: false },
                    { x: 300, y: 270, collected: false },
                    { x: 500, y: 220, collected: false },
                    { x: 230, y: 170, collected: false },
                    { x: 130, y: 120, collected: false },
                    { x: 430, y: 90, collected: false },
                    { x: 700, y: 420, collected: false },
                    { x: 150, y: 510, collected: false }
                ],
                enemies: [
                    { x: 300, y: 525, width: 55, height: 25, speed: 3, direction: 1, emoji: '👾' },
                    { x: 600, y: 425, width: 55, height: 25, speed: 2, direction: -1, emoji: '👾' }
                ],
                powerups: [
                    { x: 450, y: 220, type: 'doubleJump', emoji: '🦘', collected: false }
                ],
                playerStart: { x: 100, y: 450 }
            },
            // Level 2
            {
                platforms: [
                    { x: 0, y: 550, width: 850, height: 50, color: '#3498db' },
                    { x: 120, y: 470, width: 90, height: 22, color: '#2980b9' },
                    { x: 280, y: 410, width: 90, height: 22, color: '#2980b9' },
                    { x: 450, y: 350, width: 90, height: 22, color: '#2980b9' },
                    { x: 220, y: 290, width: 90, height: 22, color: '#2980b9' },
                    { x: 400, y: 230, width: 90, height: 22, color: '#2980b9' },
                    { x: 150, y: 170, width: 90, height: 22, color: '#2980b9' },
                    { x: 600, y: 470, width: 90, height: 22, color: '#2980b9' },
                    { x: 50, y: 130, width: 90, height: 22, color: '#2980b9' },
                    { x: 350, y: 100, width: 90, height: 22, color: '#2980b9' },
                    { x: 550, y: 170, width: 90, height: 22, color: '#2980b9' },
                    { x: 720, y: 290, width: 90, height: 22, color: '#2980b9' }
                ],
                coins: [
                    { x: 165, y: 440, collected: false },
                    { x: 325, y: 380, collected: false },
                    { x: 495, y: 320, collected: false },
                    { x: 265, y: 260, collected: false },
                    { x: 445, y: 200, collected: false },
                    { x: 195, y: 140, collected: false },
                    { x: 95, y: 100, collected: false },
                    { x: 395, y: 70, collected: false },
                    { x: 595, y: 140, collected: false },
                    { x: 765, y: 260, collected: false },
                    { x: 645, y: 440, collected: false },
                    { x: 100, y: 510, collected: false }
                ],
                enemies: [
                    { x: 250, y: 525, width: 55, height: 22, speed: 4, direction: 1, emoji: '👹' },
                    { x: 550, y: 445, width: 55, height: 22, speed: 3, direction: -1, emoji: '👹' },
                    { x: 350, y: 260, width: 55, height: 22, speed: 5, direction: 1, emoji: '👹' }
                ],
                powerups: [
                    { x: 400, y: 200, type: 'doubleJump', emoji: '🦘', collected: false },
                    { x: 220, y: 140, type: 'doubleJump', emoji: '🦘', collected: false }
                ],
                playerStart: { x: 100, y: 450 }
            },
            // Level 3 - Boss level
            {
                platforms: [
                    { x: 0, y: 550, width: 850, height: 50, color: '#e74c3c' },
                    { x: 100, y: 470, width: 80, height: 20, color: '#c0392b' },
                    { x: 230, y: 410, width: 80, height: 20, color: '#c0392b' },
                    { x: 360, y: 350, width: 80, height: 20, color: '#c0392b' },
                    { x: 490, y: 290, width: 80, height: 20, color: '#c0392b' },
                    { x: 620, y: 230, width: 80, height: 20, color: '#c0392b' },
                    { x: 300, y: 170, width: 80, height: 20, color: '#c0392b' },
                    { x: 150, y: 120, width: 80, height: 20, color: '#c0392b' },
                    { x: 450, y: 120, width: 80, height: 20, color: '#c0392b' },
                    { x: 700, y: 410, width: 80, height: 20, color: '#c0392b' },
                    { x: 50, y: 350, width: 80, height: 20, color: '#c0392b' }
                ],
                coins: [
                    { x: 140, y: 440, collected: false },
                    { x: 270, y: 380, collected: false },
                    { x: 400, y: 320, collected: false },
                    { x: 530, y: 260, collected: false },
                    { x: 660, y: 200, collected: false },
                    { x: 340, y: 140, collected: false },
                    { x: 190, y: 90, collected: false },
                    { x: 490, y: 90, collected: false },
                    { x: 740, y: 380, collected: false },
                    { x: 90, y: 320, collected: false },
                    { x: 390, y: 510, collected: false },
                    { x: 690, y: 510, collected: false },
                    { x: 250, y: 510, collected: false },
                    { x: 550, y: 510, collected: false }
                ],
                enemies: [
                    { x: 180, y: 525, width: 55, height: 20, speed: 5, direction: 1, emoji: '🔥' },
                    { x: 480, y: 525, width: 55, height: 20, speed: 4, direction: -1, emoji: '🔥' },
                    { x: 330, y: 445, width: 55, height: 20, speed: 6, direction: 1, emoji: '🔥' },
                    { x: 630, y: 365, width: 55, height: 20, speed: 5, direction: -1, emoji: '🔥' }
                ],
                powerups: [
                    { x: 360, y: 320, type: 'doubleJump', emoji: '🦘', collected: false },
                    { x: 150, y: 90, type: 'doubleJump', emoji: '🦘', collected: false }
                ],
                boss: { x: 375, y: 50, width: 100, height: 80, health: 100, maxHealth: 100, speed: 3, direction: 1, shootTimer: 0, emoji: '👹' },
                playerStart: { x: 100, y: 450 }
            }
        ];
        
        // Controls
        document.addEventListener('keydown', (e) => {
            if (!gameRunning || gamePaused) return;
            switch(e.key.toLowerCase()) {
                case 'a': case 'arrowleft': keys.left = true; player.direction = -1; break;
                case 'd': case 'arrowright': keys.right = true; player.direction = 1; break;
                case 'w': case 'arrowup': keys.up = true; break;
                case ' ': gamePaused = !gamePaused; break;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            switch(e.key.toLowerCase()) {
                case 'a': case 'arrowleft': keys.left = false; break;
                case 'd': case 'arrowright': keys.right = false; break;
                case 'w': case 'arrowup': keys.up = false; break;
            }
        });
        
        // Show message
        function showMessage(text, duration = 1800) {
            messageEl.textContent = text;
            messageEl.style.display = 'block';
            setTimeout(() => {
                messageEl.style.display = 'none';
            }, duration);
        }
        
        // Create particles
        function createParticles(x, y, count = 12, color = '#ffd700') {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x + Math.random() * 40 - 20,
                    y: y + Math.random() * 40 - 20,
                    size: 3 + Math.random() * 5,
                    speedX: (Math.random() - 0.5) * 5,
                    speedY: (Math.random() - 0.5) * 5 - 3,
                    color: color,
                    life: 30 + Math.random() * 20
                });
            }
        }
        
        // Initialize level
        function initLevel(levelNum) {
            const levelData = levels[levelNum - 1];
            platforms = [...levelData.platforms];
            coins = [...levelData.coins];
            enemies = [...levelData.enemies];
            powerups = [...levelData.powerups];
            particles = [];
            
            // Reset player
            player.x = levelData.playerStart.x;
            player.y = levelData.playerStart.y;
            player.velX = 0;
            player.velY = 0;
            player.jumping = false;
            player.doubleJump = false;
            player.doubleJumpUsed = false;
            
            // Set boss if exists
            if (levelData.boss) {
                window.boss = { ...levelData.boss };
            } else {
                window.boss = null;
            }
            
            // Update HUD
            document.getElementById('level').textContent = levelNum;
        }
        
        // Draw everything
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background elements (stars)
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            for (let i = 0; i < 50; i++) {
                const x = (Date.now() / 500 + i * 30) % canvas.width;
                const y = (i * 40) % canvas.height;
                ctx.beginPath();
                ctx.arc(x, y, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Draw platforms
            platforms.forEach(platform => {
                ctx.fillStyle = platform.color;
                ctx.fillRect(platform.x, platform.y, platform.width, platform.height);
                
                // Platform top (grass/snow effect)
                ctx.fillStyle = '#2ecc71';
                ctx.fillRect(platform.x, platform.y, platform.width, 5);
            });
            
            // Draw coins
            coins.forEach(coin => {
                if (!coin.collected) {
                    ctx.fillStyle = '#ffd700';
                    ctx.font = '28px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🪙', coin.x + 15, coin.y + 15);
                }
            });
            
            // Draw powerups
            powerups.forEach(pu => {
                if (!pu.collected) {
                    ctx.fillStyle = pu.type === 'doubleJump' ? '#38bdf8' : '#22c55e';
                    ctx.font = '32px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(pu.emoji, pu.x + 15, pu.y + 15);
                }
            });
            
            // Draw enemies
            enemies.forEach(enemy => {
                ctx.fillStyle = enemy.color || '#e74c3c';
                ctx.font = '36px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(enemy.emoji, enemy.x + enemy.width/2, enemy.y + enemy.height/2);
            });
            
            // Draw boss
            if (window.boss) {
                ctx.fillStyle = '#ef4444';
                ctx.font = '70px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(window.boss.emoji, window.boss.x + window.boss.width/2, window.boss.y + window.boss.height/2);
                
                // Boss health bar
                ctx.fillStyle = '#333';
                ctx.fillRect(window.boss.x, window.boss.y - 15, window.boss.width, 10);
                ctx.fillStyle = '#ef4444';
                ctx.fillRect(window.boss.x, window.boss.y - 15, (window.boss.width * window.boss.health / window.boss.maxHealth), 10);
            }
            
            // Draw particles
            particles.forEach(p => {
                if (p.life <= 0) return;
                ctx.globalAlpha = p.life / 50;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            });
            
            // Draw player (ALWAYS ON TOP)
            ctx.font = '48px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#3498db';
            ctx.fillText('🦸', player.x + player.width/2, player.y + player.height/2);
            
            // Draw pause overlay
            if (gamePaused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#4cc9f0';
                ctx.font = '60px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('⏸️ GAME PAUSED', canvas.width / 2, canvas.height / 2 - 50);
                ctx.fillStyle = '#a0a0c0';
                ctx.font = '30px Arial';
                ctx.fillText('Press SPACE to Resume', canvas.width / 2, canvas.height / 2 + 30);
            }
        }
        
        // Update game state
        function update(timestamp) {
            if (!gameRunning || gamePaused) {
                draw();
                animationFrameId = requestAnimationFrame(update);
                return;
            }
            
            // Time-based movement (smooth on all devices)
            const deltaTime = timestamp - lastTimestamp;
            lastTimestamp = timestamp;
            
            // Player movement
            player.velX = 0;
            if (keys.left) player.velX = -player.speed;
            if (keys.right) player.velX = player.speed;
            
            // Jump logic
            if (keys.up && (!player.jumping || (player.doubleJump && !player.doubleJumpUsed))) {
                if (!player.jumping) {
                    player.velY = -player.jumpPower;
                    player.jumping = true;
                    createParticles(player.x + player.width/2, player.y + player.height, 10, '#3498db');
                } else if (player.doubleJump && !player.doubleJumpUsed) {
                    player.velY = -player.jumpPower * 0.8;
                    player.doubleJumpUsed = true;
                    createParticles(player.x + player.width/2, player.y + player.height, 15, '#ffd700');
                }
            }
            
            // Apply gravity
            player.velY += player.gravity;
            
            // Update position
            player.x += player.velX;
            player.y += player.velY;
            
            // Boundary checks
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;
            
            // Platform collision
            player.jumping = true;
            platforms.forEach(platform => {
                if (player.y + player.height > platform.y && 
                    player.y < platform.y &&
                    player.x + player.width > platform.x && 
                    player.x < platform.x + platform.width &&
                    player.velY > 0) {
                    player.jumping = false;
                    player.y = platform.y - player.height;
                    player.velY = 0;
                    player.doubleJumpUsed = false; // Reset double jump on landing
                }
            });
            
            // Fall off bottom
            if (player.y > canvas.height) {
                lives--;
                document.getElementById('lives').textContent = lives;
                if (lives <= 0) {
                    gameOver();
                    return;
                }
                // Respawn
                player.x = levels[level-1].playerStart.x;
                player.y = levels[level-1].playerStart.y;
                player.velY = 0;
                player.velX = 0;
                player.jumping = false;
                player.doubleJumpUsed = false;
                createParticles(player.x + player.width/2, player.y + player.height/2, 15, '#ff6b6b');
            }
            
            // Coin collection
            coins.forEach(coin => {
                if (!coin.collected && 
                    player.x < coin.x + 30 && 
                    player.x + player.width > coin.x && 
                    player.y < coin.y + 30 && 
                    player.y + player.height > coin.y) {
                    coin.collected = true;
                    score += 150;
                    document.getElementById('score').textContent = score;
                    createParticles(coin.x + 15, coin.y + 15, 15, '#ffd700');
                }
            });
            
            // Powerup collection
            powerups.forEach(pu => {
                if (!pu.collected && 
                    player.x < pu.x + 30 && 
                    player.x + player.width > pu.x && 
                    player.y < pu.y + 30 && 
                    player.y + player.height > pu.y) {
                    pu.collected = true;
                    if (pu.type === 'doubleJump') {
                        player.doubleJump = true;
                        showMessage('🦘 DOUBLE JUMP!', 1500);
                        createParticles(pu.x + 15, pu.y + 15, 20, '#38bdf8');
                    }
                }
            });
            
            // Enemy movement and collision
            enemies.forEach((enemy, i) => {
                // Move enemy
                enemy.x += enemy.speed * enemy.direction;
                if (enemy.x <= 0 || enemy.x + enemy.width >= canvas.width) {
                    enemy.direction *= -1;
                }
                
                // Collision with player
                if (player.x < enemy.x + enemy.width && 
                    player.x + player.width > enemy.x && 
                    player.y < enemy.y + enemy.height && 
                    player.y + player.height > enemy.y) {
                    
                    if (player.velY > 0 && player.y + player.height < enemy.y + 25) {
                        // Jump on enemy
                        player.velY = -14;
                        score += 500;
                        document.getElementById('score').textContent = score;
                        createParticles(enemy.x + enemy.width/2, enemy.y + enemy.height/2, 20, '#ef4444');
                        enemies.splice(i, 1);
                    } else {
                        // Hit by enemy
                        lives--;
                        document.getElementById('lives').textContent = lives;
                        if (lives <= 0) {
                            gameOver();
                            return;
                        }
                        // Knockback
                        player.velY = -14;
                        player.velX = (player.x < enemy.x) ? -10 : 10;
                        // Respawn after delay
                        setTimeout(() => {
                            player.x = levels[level-1].playerStart.x;
                            player.y = levels[level-1].playerStart.y;
                            player.velY = 0;
                            player.velX = 0;
                            player.jumping = false;
                            player.doubleJumpUsed = false;
                            createParticles(player.x + player.width/2, player.y + player.height/2, 15, '#ff6b6b');
                        }, 600);
                    }
                }
            });
            
            // Boss logic
            if (window.boss) {
                // Move boss
                window.boss.x += window.boss.speed * window.boss.direction;
                if (window.boss.x <= 50 || window.boss.x + window.boss.width >= canvas.width - 50) {
                    window.boss.direction *= -1;
                }
                
                // Boss shooting (simplified)
                window.boss.shootTimer++;
                if (window.boss.shootTimer >= 60 && Math.random() > 0.7) {
                    createParticles(window.boss.x + window.boss.width/2, window.boss.y + window.boss.height, 8, '#f97316');
                    window.boss.shootTimer = 0;
                }
                
                // Boss collision
                if (player.x < window.boss.x + window.boss.width && 
                    player.x + player.width > window.boss.x && 
                    player.y < window.boss.y + window.boss.height && 
                    player.y + player.height > window.boss.y) {
                    
                    if (player.velY > 0 && player.y + player.height < window.boss.y + 40) {
                        // Jump on boss
                        player.velY = -16;
                        window.boss.health -= 10;
                        score += 1000;
                        document.getElementById('score').textContent = score;
                        createParticles(window.boss.x + window.boss.width/2, window.boss.y + window.boss.height/2, 25, '#f87171');
                        
                        if (window.boss.health <= 0) {
                            // Boss defeated
                            score += 5000;
                            document.getElementById('score').textContent = score;
                            showMessage('👹 BOSS DEFEATED! +5000', 2500);
                            createParticles(425, 100, 50, '#fbbf24');
                            
                            // Level complete
                            setTimeout(() => {
                                if (level < levels.length) {
                                    level++;
                                    initLevel(level);
                                    showMessage('LEVEL ' + level + ' UNLOCKED!', 2000);
                                } else {
                                    // Game completed
                                    gameRunning = false;
                                    cancelAnimationFrame(animationFrameId);
                                    document.getElementById('finalScore').textContent = score;
                                    document.getElementById('gameOver').style.display = 'flex';
                                }
                            }, 2500);
                        }
                    } else {
                        // Hit by boss
                        lives--;
                        document.getElementById('lives').textContent = lives;
                        if (lives <= 0) {
                            gameOver();
                            return;
                        }
                        player.velY = -16;
                        player.velX = (player.x < window.boss.x) ? -12 : 12;
                        // Respawn
                        setTimeout(() => {
                            player.x = levels[level-1].playerStart.x;
                            player.y = levels[level-1].playerStart.y;
                            player.velY = 0;
                            player.velX = 0;
                            player.jumping = false;
                            player.doubleJumpUsed = false;
                            createParticles(player.x + player.width/2, player.y + player.height/2, 15, '#ff6b6b');
                        }, 600);
                    }
                }
            }
            
            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.speedX;
                p.y += p.speedY;
                p.speedY += 0.2;
                p.life--;
                p.size *= 0.97;
                if (p.life <= 0 || p.size < 0.5) {
                    particles.splice(i, 1);
                }
            }
            
            // Level completion check
            if (!window.boss && coins.every(c => c.collected)) {
                if (level < levels.length) {
                    showMessage('🎉 LEVEL ' + level + ' COMPLETE!', 2000);
                    setTimeout(() => {
                        level++;
                        initLevel(level);
                        showMessage('LEVEL ' + level + ' UNLOCKED!', 2000);
                    }, 2000);
                }
            }
            
            // Draw everything
            draw();
            
            // Continue game loop
            animationFrameId = requestAnimationFrame(update);
        }
        
        function startGame() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            level = 1;
            score = 0;
            lives = 3;
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            
            initLevel(level);
            gameRunning = true;
            gamePaused = false;
            lastTimestamp = performance.now();
            animationFrameId = requestAnimationFrame(update);
        }
        
        function restartGame() {
            startGame();
        }
        
        function gameOver() {
            gameRunning = false;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'flex';
        }
        
        // Initial draw
        draw();
    </script>
</body>
</html>
